<style id="cyn-live-style">
  /* .loop-sizer は "高さ確保用のプレースホルダ" なので visibility:hidden のまま。
     実際に見えるのは .loop-track と .loop-clone（絶対配置オーバーレイ） */
  /* ハイドレーション前に透明になっている appear 要素を常時表示 */
  .appear { opacity: 1 !important; transform: none !important; }
  .loop-track, .loop-clone { will-change: transform; transition: none !important; }
  /* 背景動画のフォールバック（JSでautoplay失敗しても最低限見えるように） */
  #bg-movie { background: #0d2623; }

  /* --- Studio runtime が効かないと白地になってしまうセクション背景を明示 --- */

  /* CONTACT セクション（div uuid=6791a066…）の土台白地を SEMINAR と同じ sage mint にする。
     内部のカードは独自の緑グラデを持っているので触らない。 */
  div[data-s-6791a066-43f9-470b-8f5e-f76cc5d0b952] {
    background-color: #E5EFE4 !important;
  }

  /* WORKS セクションの巨大な "WORKS" ウォーターマーク（p uuid=be69e1c4…）は
     本来 decorative background として 薄く敷かれるはずが、JS無効のままだと
     前面でベタに描かれ、日本語見出し "生成AIを事業の強みに変えた事例が続々" と
     重なって読めなくなる。装飾としての透過を付与して背後に回す。 */
  div[data-s-efdb9bb9-6998-4692-a5ab-400991331b74] { isolation: isolate; }
  p[data-s-be69e1c4-a0a3-4adc-9dd5-f9f494d04273] {
    z-index: 0 !important;
    opacity: 0.22 !important;
    pointer-events: none;
  }
  /* 見出しブロックを前面に引き上げ、ウォーターマークに埋もれないようにする */
  div[data-s-181ef032-64da-4d53-91ea-96d625870c72] {
    position: relative;
    z-index: 2;
  }

  /* --- CONTACT section hero photo (BG) ---
     本家は .image:before の background-image に data-r- 別の URL を流し込む。
     1つ目（9fe0acf0 側）は JS捕獲前だったため inline <style> が空。同じ URL を
     :before に注入する。上に乗るカードの可読性確保のため、親 6791a066 側に
     暗めのオーバーレイを重ねる。 */
  .sd[data-r-0_10_9fe0acf0-c591-4279-ba42-347f69fec261_e4cda0a1-7ad4-4165-812d-14ec3d3f07e0]:before {

  }
  /* 写真の上に暗めのオーバーレイ（カード・見出しの可読性を上げる） */
  div[data-s-e4cda0a1-7ad4-4165-812d-14ec3d3f07e0] { position: relative; }
